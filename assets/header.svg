<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #080b0f; }
      .grid { stroke: #0d2b1a; stroke-width: 0.8; }
      .axis { stroke: #1a3a28; stroke-width: 1; }
      .bull { fill: #00c853; stroke: #00c853; }
      .bear { fill: #0a0a0a; stroke: #00c853; }
      .wick { stroke: #00c853; stroke-width: 1.5; }
      .line { fill: none; stroke: #00ff6a; stroke-width: 1.5; opacity: 0.5; }
      .glowline { fill: none; stroke: #00ff6a; stroke-width: 2.5;
                  filter: url(#glow); opacity: 0.9; }
      .scanline { fill: none; stroke: #00ff6a; stroke-width: 1;
                  opacity: 0; animation: scan 3s linear infinite; }
      .tag { font-family: 'Share Tech Mono', monospace; fill: #00c853; font-size: 11px; }
      .tag-dim { font-family: 'Share Tech Mono', monospace; fill: #1e5c38; font-size: 10px; }
      .title { font-family: 'Share Tech Mono', monospace; fill: #00ff6a;
               font-size: 28px; font-weight: bold; letter-spacing: 3px; }
      .subtitle { font-family: 'Share Tech Mono', monospace; fill: #3ddc84;
                  font-size: 13px; letter-spacing: 6px; opacity: 0.85; }
      .cursor { fill: #00ff6a; animation: blink 1s step-end infinite; }
      .pricetag { font-family: 'Share Tech Mono', monospace; fill: #080b0f;
                  font-size: 10px; font-weight: bold; }

      .fadeIn { animation: fadeIn 1.2s ease forwards; opacity: 0; }
      .fadeIn2 { animation: fadeIn 1.2s ease 0.4s forwards; opacity: 0; }
      .fadeIn3 { animation: fadeIn 1.2s ease 0.8s forwards; opacity: 0; }
      .fadeIn4 { animation: fadeIn 1.2s ease 1.2s forwards; opacity: 0; }
      .candlerise { animation: candlerise 1s ease forwards; }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes scan {
        0%   { opacity: 0; transform: translateY(0); }
        10%  { opacity: 0.15; }
        90%  { opacity: 0.15; }
        100% { opacity: 0; transform: translateY(220px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fadeout" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#080b0f" stop-opacity="1"/>
      <stop offset="15%" stop-color="#080b0f" stop-opacity="0"/>
      <stop offset="85%" stop-color="#080b0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080b0f" stop-opacity="1"/>
    </linearGradient>
    <mask id="edgeMask">
      <rect width="900" height="220" fill="url(#fadeout)"/>
    </mask>
  </defs>

  <!-- BG -->
  <rect width="900" height="220" class="bg"/>

  <!-- GRID HORIZONTAL -->
  <g class="fadeIn">
    <line x1="0" y1="44" x2="900" y2="44" class="grid"/>
    <line x1="0" y1="88" x2="900" y2="88" class="grid"/>
    <line x1="0" y1="132" x2="900" y2="132" class="grid"/>
    <line x1="0" y1="176" x2="900" y2="176" class="grid"/>
  </g>
  <!-- GRID VERTICAL -->
  <g class="fadeIn">
    <line x1="90" y1="0" x2="90" y2="220" class="grid"/>
    <line x1="180" y1="0" x2="180" y2="220" class="grid"/>
    <line x1="270" y1="0" x2="270" y2="220" class="grid"/>
    <line x1="360" y1="0" x2="360" y2="220" class="grid"/>
    <line x1="450" y1="0" x2="450" y2="220" class="grid"/>
    <line x1="540" y1="0" x2="540" y2="220" class="grid"/>
    <line x1="630" y1="0" x2="630" y2="220" class="grid"/>
    <line x1="720" y1="0" x2="720" y2="220" class="grid"/>
    <line x1="810" y1="0" x2="810" y2="220" class="grid"/>
  </g>

  <!-- PRICE LABELS (left) -->
  <g class="fadeIn tag-dim">
    <text x="4" y="42">97.2K</text>
    <text x="4" y="86">95.8K</text>
    <text x="4" y="130">94.4K</text>
    <text x="4" y="174">93.0K</text>
  </g>

  <!-- CANDLES — zone gauche -->
  <g class="fadeIn2" mask="url(#edgeMask)">
    <!-- wicks -->
    <line x1="100" y1="68" x2="100" y2="158" class="wick"/>
    <line x1="130" y1="55" x2="130" y2="140" class="wick"/>
    <line x1="160" y1="72" x2="160" y2="155" class="wick"/>
    <line x1="190" y1="60" x2="190" y2="148" class="wick"/>
    <line x1="220" y1="50" x2="220" y2="130" class="wick"/>
    <line x1="250" y1="45" x2="250" y2="120" class="wick"/>
    <line x1="280" y1="55" x2="280" y2="135" class="wick"/>
    <line x1="310" y1="40" x2="310" y2="115" class="wick"/>
    <!-- bodies bull -->
    <rect x="93"  y="90"  width="14" height="48" class="bull"/>
    <rect x="123" y="75"  width="14" height="40" class="bull"/>
    <rect x="153" y="95"  width="14" height="38" class="bear"/>
    <rect x="183" y="80"  width="14" height="42" class="bull"/>
    <rect x="213" y="68"  width="14" height="38" class="bull"/>
    <rect x="243" y="62"  width="14" height="35" class="bear"/>
    <rect x="273" y="72"  width="14" height="40" class="bull"/>
    <rect x="303" y="58"  width="14" height="34" class="bull"/>
  </g>

  <!-- CANDLES — zone droite -->
  <g class="fadeIn2" mask="url(#edgeMask)">
    <line x1="580" y1="52" x2="580" y2="122" class="wick"/>
    <line x1="610" y1="48" x2="610" y2="118" class="wick"/>
    <line x1="640" y1="55" x2="640" y2="128" class="wick"/>
    <line x1="670" y1="42" x2="670" y2="108" class="wick"/>
    <line x1="700" y1="38" x2="700" y2="105" class="wick"/>
    <line x1="730" y1="45" x2="730" y2="115" class="wick"/>
    <line x1="760" y1="35" x2="760" y2="100" class="wick"/>
    <line x1="790" y1="30" x2="790" y2="92" class="wick"/>
    <rect x="573" y="68"  width="14" height="32" class="bull"/>
    <rect x="603" y="62"  width="14" height="34" class="bear"/>
    <rect x="633" y="72"  width="14" height="35" class="bull"/>
    <rect x="663" y="56"  width="14" height="30" class="bull"/>
    <rect x="693" y="52"  width="14" height="30" class="bear"/>
    <rect x="723" y="58"  width="14" height="28" class="bull"/>
    <rect x="753" y="45"  width="14" height="30" class="bull"/>
    <rect x="783" y="40"  width="14" height="28" class="bull"/>
  </g>

  <!-- MA LINE (moving average) -->
  <g class="fadeIn3">
    <polyline class="glowline"
      points="90,148 130,132 170,128 210,118 250,112 290,108 330,100
              570,100 610,92 650,88 690,80 730,76 770,68 810,60"/>
  </g>

  <!-- PRICE TAG actuel -->
  <g class="fadeIn3" style="animation: pulse 2s ease infinite;">
    <rect x="820" y="52" width="60" height="16" fill="#00c853" rx="2"/>
    <text x="824" y="63" class="pricetag">96,840 ▲</text>
  </g>

  <!-- TEXTE CENTRAL -->
  <g class="fadeIn3">
    <text x="450" y="108" class="title" text-anchor="middle" filter="url(#softglow)">MAX</text>
    <text x="450" y="132" class="subtitle" text-anchor="middle">TRADE  ·  BUILD  ·  ITERATE</text>
  </g>

  <!-- CURSOR CLIGNOTANT -->
  <rect x="530" y="119" width="8" height="14" class="cursor fadeIn4"/>

  <!-- TICKER INFO bas -->
  <g class="fadeIn4">
    <text x="18" y="210" class="tag">BTC/USDT</text>
    <text x="100" y="210" class="tag" fill="#00ff6a">+2.34%</text>
    <text x="160" y="210" class="tag-dim">|</text>
    <text x="170" y="210" class="tag">ETH/USDT</text>
    <text x="255" y="210" class="tag" fill="#00ff6a">+1.87%</text>
    <text x="315" y="210" class="tag-dim">|</text>
    <text x="325" y="210" class="tag">SOL/USDT</text>
    <text x="410" y="210" class="tag" fill="#00ff6a">+3.12%</text>
    <text x="700" y="210" class="tag-dim">PINE SCRIPT  ·  v5/v6</text>
  </g>

  <!-- SCAN LINE OVERLAY -->
  <rect width="900" height="1" y="-2" fill="none" stroke="#00ff6a" stroke-width="1" opacity="0.08" class="scanline"/>
</svg>