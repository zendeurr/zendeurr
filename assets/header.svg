    <text class="tag" x="262" y="304">SOL</text>
    <text class="tagUp" x="300" y="304">+2.08%</text>
    <text class="tagDim" x="900" y="304">5M · 15M · 1H · 4H</text>
    <text class="tagDim" x="1048" y="304">PINE v5/v6</text>
  </g>
</svg>
