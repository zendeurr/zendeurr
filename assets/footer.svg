<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100" width="900" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .bg { fill: #080b0f; }
      .grid { stroke: #0d2b1a; stroke-width: 0.7; }
      .wick { stroke: #00c853; stroke-width: 1.2; }
      .bull { fill: #00c853; }
      .bear { fill: #0a0a0a; stroke: #00c853; stroke-width: 1; }
      .glowline { fill: none; stroke: #00ff6a; stroke-width: 1.5; opacity: 0.6; filter: url(#glow); }
      .quote { font-family: 'Share Tech Mono', monospace; fill: #3ddc84;
               font-size: 12px; letter-spacing: 1.5px; }
      .dim { font-family: 'Share Tech Mono', monospace; fill: #1e5c38; font-size: 10px; }
      .fadeUp { animation: fadeUp 1s ease 0.3s forwards; opacity: 0; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(5px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
      .pulse { animation: pulse 2.5s ease infinite; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="fadeout" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#080b0f" stop-opacity="1"/>
      <stop offset="12%" stop-color="#080b0f" stop-opacity="0"/>
      <stop offset="88%" stop-color="#080b0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080b0f" stop-opacity="1"/>
    </linearGradient>
    <mask id="m"><rect width="900" height="100" fill="url(#fadeout)"/></mask>
  </defs>

  <rect width="900" height="100" class="bg"/>

  <!-- MINI GRID -->
  <line x1="0" y1="25" x2="900" y2="25" class="grid"/>
  <line x1="0" y1="50" x2="900" y2="50" class="grid"/>
  <line x1="0" y1="75" x2="900" y2="75" class="grid"/>

  <!-- MINI CANDLES dispersées -->
  <g mask="url(#m)">
    <line x1="30"  y1="15" x2="30"  y2="65" class="wick"/>
    <line x1="60"  y1="18" x2="60"  y2="60" class="wick"/>
    <line x1="90"  y1="12" x2="90"  y2="55" class="wick"/>
    <line x1="120" y1="20" x2="120" y2="58" class="wick"/>
    <line x1="150" y1="10" x2="150" y2="50" class="wick"/>
    <rect x="24"  y="32" width="12" height="22" class="bull"/>
    <rect x="54"  y="28" width="12" height="20" class="bear"/>
    <rect x="84"  y="25" width="12" height="20" class="bull"/>
    <rect x="114" y="30" width="12" height="18" class="bear"/>
    <rect x="144" y="22" width="12" height="18" class="bull"/>

    <line x1="740" y1="15" x2="740" y2="62" class="wick"/>
    <line x1="770" y1="12" x2="770" y2="55" class="wick"/>
    <line x1="800" y1="18" x2="800" y2="58" class="wick"/>
    <line x1="830" y1="8"  x2="830" y2="50" class="wick"/>
    <line x1="860" y1="14" x2="860" y2="52" class="wick"/>
    <rect x="734" y="30" width="12" height="20" class="bull"/>
    <rect x="764" y="24" width="12" height="20" class="bull"/>
    <rect x="794" y="28" width="12" height="18" class="bear"/>
    <rect x="824" y="18" width="12" height="20" class="bull"/>
    <rect x="854" y="22" width="12" height="18" class="bull"/>
  </g>

  <!-- MA LINE basse -->
  <polyline class="glowline pulse" mask="url(#m)"
    points="0,58 50,52 100,46 150,40 200,38 250,36 300,34
            600,34 650,30 700,26 750,22 800,18 850,14 900,10"/>

  <!-- QUOTE CENTRALE -->
  <text x="450" y="44" class="quote fadeUp" text-anchor="middle">
    — noise fades. edge compounds. —
  </text>
  <text x="450" y="62" class="dim fadeUp" text-anchor="middle">
    github.com/Max
  </text>
</svg>