<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="1200" height="140" role="img" aria-label="Footer — noise fades edge compounds">
  <defs>
    <style type="text/css"><![CDATA[
      .bg { fill: #080b0f; }
      .grid { stroke: #0f1f18; stroke-width: 0.7; opacity: 0.85; }
      .wick { stroke: #00c853; stroke-width: 1.2; }
      .bull { fill: #00c853; }
      .bear { fill: #0a1210; stroke: #00c853; stroke-width: 1; }
      .trendLine {
        fill: none;
        stroke: #00ff6a;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#lineGlow);
        animation: lineShimmer 2.6s ease-in-out infinite;
      }
      .marker {
        fill: #00c853;
        animation: markerPulse 2s ease-in-out infinite;
      }
      .sig {
        font-family: ui-monospace, 'Cascadia Mono', 'Segoe UI Mono', 'Share Tech Mono', monospace;
        fill: #00c853;
        font-size: 13px;
        letter-spacing: 0.12em;
      }
      .meta {
        font-family: ui-monospace, 'Cascadia Mono', 'Segoe UI Mono', 'Share Tech Mono', monospace;
        fill: #1e5c38;
        font-size: 10px;
        letter-spacing: 0.2em;
      }
      .fadeA { animation: fadeUp 0.85s ease 0.2s forwards; opacity: 0; }
      .fadeB { animation: fadeUp 0.85s ease 0.55s forwards; opacity: 0; }
      .fadeC { animation: fadeUp 0.85s ease 0.85s forwards; opacity: 0; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes lineShimmer {
        0%, 100% { stroke-opacity: 0.55; }
        50% { stroke-opacity: 1; }
      }
      @keyframes markerPulse {
        0%, 100% { opacity: 0.65; }
        50% { opacity: 1; }
      }
    ]]></style>
    <filter id="lineGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="edgeFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#080b0f" stop-opacity="1"/>
      <stop offset="10%" stop-color="#080b0f" stop-opacity="0"/>
      <stop offset="90%" stop-color="#080b0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080b0f" stop-opacity="1"/>
    </linearGradient>
    <mask id="edgeMask">
      <rect width="1200" height="140" fill="url(#edgeFade)"/>
    </mask>
  </defs>

  <rect class="bg" width="1200" height="140"/>

  <g id="miniGrid">
    <line class="grid" x1="0" y1="36" x2="1200" y2="36"/>
    <line class="grid" x1="0" y1="72" x2="1200" y2="72"/>
    <line class="grid" x1="0" y1="108" x2="1200" y2="108"/>
  </g>

  <!-- Edge candles -->
  <g mask="url(#edgeMask)">
    <g id="candlesLeft">
      <line class="wick" x1="32" y1="22" x2="32" y2="88"/>
      <line class="wick" x1="58" y1="26" x2="58" y2="84"/>
      <line class="wick" x1="84" y1="18" x2="84" y2="78"/>
      <line class="wick" x1="110" y1="24" x2="110" y2="82"/>
      <rect class="bull" x="25" y="44" width="14" height="28"/>
      <rect class="bear" x="51" y="40" width="14" height="24"/>
      <rect class="bull" x="77" y="36" width="14" height="26"/>
      <rect class="bear" x="103" y="42" width="14" height="22"/>
    </g>
    <g id="candlesRight">
      <line class="wick" x1="1090" y1="22" x2="1090" y2="88"/>
      <line class="wick" x1="1116" y1="18" x2="1116" y2="80"/>
      <line class="wick" x1="1142" y1="24" x2="1142" y2="84"/>
      <line class="wick" x1="1168" y1="20" x2="1168" y2="78"/>
      <rect class="bull" x="1083" y="40" width="14" height="26"/>
      <rect class="bull" x="1109" y="34" width="14" height="28"/>
      <rect class="bear" x="1135" y="42" width="14" height="24"/>
      <rect class="bull" x="1161" y="36" width="14" height="26"/>
    </g>
  </g>

  <!-- Mini bullish chart -->
  <g class="fadeA" mask="url(#edgeMask)">
    <polyline class="trendLine"
      points="380,96 430,88 480,82 530,74 580,68 630,60 680,52 730,46 770,40"/>
    <circle class="marker" cx="770" cy="40" r="4"/>
  </g>

  <!-- Signature -->
  <text class="sig fadeB" x="600" y="118" text-anchor="middle">— noise fades. edge compounds. —</text>
  <text class="meta fadeC" x="600" y="134" text-anchor="middle">GITHUB.COM/ZENDEURR</text>
</svg>
